name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hygiene
        run: |
          local_part="jacobvogan"
          domain_part="gmail.com"
          needle="${local_part}@${domain_part}"
          if git grep -n "$needle" -- . >/tmp/email_hits.txt; then
            cat /tmp/email_hits.txt
            echo "Tracked files must not contain the blocked personal email address."
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
      - name: CLI Smoke
        run: |
          uv run yt-agent --help
          uv run youtube-cli --help
