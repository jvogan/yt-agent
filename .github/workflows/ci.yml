name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          arch="$(uname -m)"
          case "$arch" in
            x86_64)
              asset="gitleaks_${version}_linux_x64.tar.gz"
              checksum="79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e"
              ;;
            aarch64|arm64)
              asset="gitleaks_${version}_linux_arm64.tar.gz"
              checksum="b4cbbb6ddf7d1b2a603088cd03a4e3f7ce48ee7fd449b51f7de6ee2906f5fa2f"
              ;;
            *)
              echo "Unsupported runner architecture: $arch"
              exit 1
              ;;
          esac

          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSLo "$RUNNER_TEMP/$asset" "https://github.com/gitleaks/gitleaks/releases/download/v${version}/$asset"
          echo "${checksum}  $RUNNER_TEMP/$asset" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/$asset" -C "$RUNNER_TEMP"
          install -m 0755 "$RUNNER_TEMP/gitleaks" "$RUNNER_TEMP/bin/gitleaks"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Gitleaks
        run: gitleaks git . --no-banner --redact

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Hygiene
        shell: bash
        run: |
          local_part="jacobvogan"
          domain_part="gmail.com"
          needle="${local_part}@${domain_part}"
          if git grep -n "$needle" -- . >/tmp/email_hits.txt; then
            cat /tmp/email_hits.txt
            echo "Tracked files must not contain the blocked personal email address."
            exit 1
          fi
          blocked_files="$(git ls-files | grep -E '(^|/)\.env(\..+)?$|(^|/)cookies[^/]*\.txt$|\.sqlite3?$|\.db$|\.jsonl$' || true)"
          if [ -n "$blocked_files" ]; then
            echo "Tracked files must not include local state or secret-looking artifacts:"
            echo "$blocked_files"
            exit 1
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Sync
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Test
        run: uv run pytest --cov --cov-report=term-missing
      - name: CLI Smoke
        run: |
          uv run yt-agent --version
          uv run yt-agent --help
          uv run youtube-cli --help
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      - name: Build distributions
        run: uv build
      - name: Check distributions
        run: uv run --with twine twine check dist/*
      - name: Install smoke
        run: |
          uv tool run --from . yt-agent --help
          uv tool run --from . youtube-cli --help
