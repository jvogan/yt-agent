name: Bug report
description: Report a reproducible problem in yt-agent
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include a command, platform, and enough detail to reproduce the issue.
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command you ran.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Include `yt-agent doctor` output and relevant errors. Remove secrets, cookies, and private paths you do not want public.
