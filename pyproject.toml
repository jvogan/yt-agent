[project]
name = "youtube-cli"
version = "0.1.0"
description = "Private terminal-first YouTube search and download workflow built on yt-dlp."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
  "rich>=14.0.0",
  "typer>=0.16.0",
]

[project.scripts]
youtube-cli = "youtube_cli.cli:main"

[dependency-groups]
dev = [
  "pytest>=8.4.0",
  "ruff>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/youtube_cli"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py314"

